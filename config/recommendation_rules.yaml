# Recommendation Engine Rules Configuration
# Tune these rules without changing code

# Technical Indicators Thresholds
technical:
  trend:
    bullish_threshold: 0.02    # Price > 20/50/200 DMA by 2%
    bearish_threshold: -0.02   # Price < 20/50/200 DMA by 2%
  
  rsi:
    oversold: 30
    overbought: 70
    neutral_min: 40
    neutral_max: 60
  
  macd:
    positive_momentum: 0.1     # MACD histogram > 0.1
    negative_momentum: -0.1    # MACD histogram < -0.1

# Momentum Thresholds (vs sector)
momentum:
  strong_positive: 0.15      # 15% outperformance vs sector
  weak_positive: 0.05       # 5% outperformance vs sector
  weak_negative: -0.05      # 5% underperformance vs sector
  strong_negative: -0.15    # 15% underperformance vs sector

# News Consensus Thresholds
news:
  positive_threshold: 0.2    # News consensus >= 0.2 for positive signal
  negative_threshold: -0.2   # News consensus <= -0.2 for negative signal
  falling_threshold: -0.1    # News trending down

# Earnings Risk Windows (hours)
earnings:
  high_risk: 24             # Within 24 hours of earnings
  medium_risk: 48           # Within 48 hours of earnings
  safe_window: 72           # Safe to trade if > 72 hours

# Portfolio Context Thresholds
portfolio:
  overweight_threshold: 0.15  # Position > 15% of portfolio
  underweight_threshold: 0.02 # Position < 2% of portfolio
  profit_target: 0.20        # Take profits at 20% gain
  stop_loss: -0.10           # Stop loss at 10% loss

# Recommendation Rules
rules:
  buy:
    conditions:
      - trend_regime: "positive"
      - momentum_1m: "positive" 
      - news_consensus: ">= 0.2"
      - earnings_risk: "safe"
      - position_size: "< overweight"
    confidence_base: 0.8
    horizon_days: 30
    
  strong_buy:
    conditions:
      - trend_regime: "positive"
      - momentum_1m: "strong_positive"
      - momentum_3m: "positive"
      - rsi: "oversold_or_neutral"
      - macd: "positive"
      - news_consensus: ">= 0.3"
      - earnings_risk: "safe"
    confidence_base: 0.9
    horizon_days: 45

  hold:
    conditions:
      - trend_regime: "mixed"
      - earnings_risk: "medium"
    confidence_base: 0.6
    horizon_days: 14
    
  hold_earnings:
    conditions:
      - earnings_risk: "high"
      - news_consensus: ">= -0.1"
    confidence_base: 0.5
    horizon_days: 7

  reduce:
    conditions:
      - trend_regime: "negative"
      - news_consensus: "falling"
      - position_size: "> underweight"
    confidence_base: 0.7
    horizon_days: 14
    
  reduce_overweight:
    conditions:
      - position_size: "> overweight"
      - earnings_risk: "medium"
      - news_consensus: "< 0.1"
    confidence_base: 0.8
    horizon_days: 7

  exit:
    conditions:
      - trend_regime: "broken"
      - news_consensus: "<= -0.3"
    confidence_base: 0.9
    horizon_days: 3
    
  exit_stop_loss:
    conditions:
      - position_pnl: "<= stop_loss"
    confidence_base: 0.95
    horizon_days: 1

# Confidence Modifiers
confidence_modifiers:
  high_volume: 0.1           # Boost confidence on high volume days
  low_volatility: 0.05       # Boost confidence in low volatility
  sector_rotation: -0.1      # Reduce confidence during sector rotation
  market_stress: -0.2        # Reduce confidence during market stress