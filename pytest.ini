[tool:pytest]
minversion = 7.0
addopts = 
    -ra 
    --strict-markers
    --disable-warnings
    --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: marks tests as integration tests (may be skipped in DRY_RUN)
    e2e: marks tests as end-to-end tests (skipped in DRY_RUN)  
    slow: marks tests as slow (skipped in DRY_RUN)
    unit: marks tests as unit tests (always run)

# Skip certain tests in DRY_RUN mode
filterwarnings = 
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Async test support
asyncio_mode = auto