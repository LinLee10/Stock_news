version: '3.8'

services:
  # Infrastructure Services
  redis:
    image: redis:7-alpine
    container_name: stonk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: stonk-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: stonk-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: stonk-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.0.0
    container_name: stonk-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: stonk-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "6831:6831/udp"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Microservices
  news-scraping-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.news-scraping
    container_name: stonk-news-scraping
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=news-scraping-service
      - SERVICE_PORT=8001
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - PROMETHEUS_ENDPOINT=http://prometheus:9090
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  data-ingestion-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.data-ingestion
    container_name: stonk-data-ingestion
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=data-ingestion-service
      - SERVICE_PORT=8002
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  sentiment-analysis-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.sentiment-analysis
    container_name: stonk-sentiment-analysis
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=sentiment-analysis-service
      - SERVICE_PORT=8003
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - TRANSFORMERS_CACHE=/app/model_cache
    volumes:
      - ./config:/app/config
      - model_cache:/app/model_cache
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  recommendation-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.recommendation
    container_name: stonk-recommendation
    ports:
      - "8004:8004"
    environment:
      - SERVICE_NAME=recommendation-service
      - SERVICE_PORT=8004
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.notification
    container_name: stonk-notification
    ports:
      - "8005:8005"
    environment:
      - SERVICE_NAME=notification-service
      - SERVICE_PORT=8005
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-gateway
    container_name: stonk-api-gateway
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=api-gateway
      - SERVICE_PORT=8000
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - NEWS_SERVICE_URL=http://news-scraping-service:8001
      - DATA_SERVICE_URL=http://data-ingestion-service:8002
      - SENTIMENT_SERVICE_URL=http://sentiment-analysis-service:8003
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8004
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
    volumes:
      - ./config:/app/config
    depends_on:
      - news-scraping-service
      - data-ingestion-service
      - sentiment-analysis-service
      - recommendation-service
      - notification-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  model_cache:
    driver: local

# BEGIN F18_PROFILES
  # F18 Microservices Mode (Optional)
  f18-api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.f18-api-gateway
    container_name: f18-api-gateway
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=f18-api-gateway
      - SERVICE_PORT=8000
      - NEWS_SERVICE_URL=http://f18-news-scraping:8001
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config
    depends_on:
      - f18-news-scraping
    networks:
      - f18-network
    profiles:
      - micro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  f18-news-scraping:
    build:
      context: .
      dockerfile: docker/Dockerfile.f18-news-scraping
    container_name: f18-news-scraping
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=f18-news-scraping
      - SERVICE_PORT=8001
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config
    networks:
      - f18-network
    profiles:
      - micro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
# END F18_PROFILES

networks:
  default:
    name: stonk-network
    driver: bridge
  f18-network:
    name: f18-network
    driver: bridge