name: Alpha Vantage Reset Timing Probe

# Runs twice daily to determine quota reset behavior:
# - 23:58 UTC (pre-midnight probe)  
# - 00:01 UTC (post-midnight probe)

on:
  schedule:
    - cron: '58 23 * * *'  # 23:58 UTC daily (pre-midnight)
    - cron: '1 0 * * *'    # 00:01 UTC daily (post-midnight)
  workflow_dispatch:      # Allow manual triggering

jobs:
  alpha-vantage-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Determine Probe Type
        id: probe-type
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [[ "$CURRENT_HOUR" == "23" ]]; then
            echo "type=pre" >> $GITHUB_OUTPUT
            echo "window=pre-midnight" >> $GITHUB_OUTPUT
          else
            echo "type=post" >> $GITHUB_OUTPUT  
            echo "window=post-midnight" >> $GITHUB_OUTPUT
          fi
          echo "timestamp=$(date -u +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT
          
      - name: Execute Alpha Vantage Probe
        id: probe
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          PROBE_TYPE: ${{ steps.probe-type.outputs.type }}
          TIMESTAMP: ${{ steps.probe-type.outputs.timestamp }}
        run: |
          # Create directories
          mkdir -p probes/results
          mkdir -p logs
          
          # Execute probe call
          RESPONSE_FILE="probes/results/probe_${TIMESTAMP}_${PROBE_TYPE}.json"
          METRICS_FILE="probes/results/probe_${TIMESTAMP}_${PROBE_TYPE}_metrics.txt"
          
          echo "Executing Alpha Vantage probe: ${PROBE_TYPE} at $(date -u)"
          
          # Make API call with detailed metrics
          HTTP_STATUS=$(curl -s -w "%{http_code}" \
            --connect-timeout 30 \
            --max-time 60 \
            -o "$RESPONSE_FILE" \
            "https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=AAPL&apikey=${ALPHA_VANTAGE_KEY}")
          
          # Capture additional metrics
          RESPONSE_SIZE=$(stat -c%s "$RESPONSE_FILE" 2>/dev/null || echo "0")
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          
          # Write metrics
          cat > "$METRICS_FILE" << EOF
          probe_timestamp: $CURRENT_TIME
          probe_type: $PROBE_TYPE
          http_status: $HTTP_STATUS
          response_size_bytes: $RESPONSE_SIZE
          api_endpoint: GLOBAL_QUOTE
          symbol: AAPL
          EOF
          
          # Check for rate limit indicators in response
          if [[ $HTTP_STATUS == "200" ]]; then
            # Check if response contains rate limit message
            if grep -q "rate limit\|Thank you for using Alpha Vantage" "$RESPONSE_FILE" 2>/dev/null; then
              echo "status=rate_limited" >> $GITHUB_OUTPUT
              echo "result=HTTP_200_RATE_LIMITED" >> $GITHUB_OUTPUT
            else
              echo "status=success" >> $GITHUB_OUTPUT  
              echo "result=HTTP_200_SUCCESS" >> $GITHUB_OUTPUT
            fi
          elif [[ $HTTP_STATUS == "429" ]]; then
            echo "status=rate_limited" >> $GITHUB_OUTPUT
            echo "result=HTTP_429_RATE_LIMITED" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "result=HTTP_${HTTP_STATUS}_ERROR" >> $GITHUB_OUTPUT
          fi
          
          echo "http_status=${HTTP_STATUS}" >> $GITHUB_OUTPUT
          echo "response_file=${RESPONSE_FILE}" >> $GITHUB_OUTPUT
          echo "metrics_file=${METRICS_FILE}" >> $GITHUB_OUTPUT
          
      - name: Log Probe Results
        env:
          PROBE_TYPE: ${{ steps.probe-type.outputs.type }}
          WINDOW: ${{ steps.probe-type.outputs.window }}
          TIMESTAMP: ${{ steps.probe-type.outputs.timestamp }}
          STATUS: ${{ steps.probe.outputs.status }}
          RESULT: ${{ steps.probe.outputs.result }}
          HTTP_STATUS: ${{ steps.probe.outputs.http_status }}
        run: |
          # Append to API usage log
          LOG_ENTRY="${TIMESTAMP} UTC — ProbeType=${PROBE_TYPE} — Status=${RESULT} — Window=${WINDOW} — Evidence=probes/results/probe_${TIMESTAMP}_${PROBE_TYPE}.json"
          echo "$LOG_ENTRY" >> logs/api_usage_log.md
          
          # Update probe state
          if [[ -f "probes/probe_state.json" ]]; then
            # Use jq to update probe state (if available), otherwise simple append
            if command -v jq >/dev/null 2>&1; then
              jq --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                 --arg probe_type "$PROBE_TYPE" \
                 --arg status "$STATUS" \
                 --arg result "$RESULT" \
                 '.services.alpha_vantage.probe_results += [{
                   "timestamp": $timestamp,
                   "probe_type": $probe_type, 
                   "status": $status,
                   "result": $result,
                   "window": "'$WINDOW'"
                 }] | .services.alpha_vantage.last_probe_at = $timestamp' \
                 probes/probe_state.json > probes/probe_state.json.tmp && \
                 mv probes/probe_state.json.tmp probes/probe_state.json
            else
              echo "# Probe result logged: $LOG_ENTRY" >> probes/probe_results.log
            fi
          fi
          
          echo "✅ Probe completed: $RESULT"
          
      - name: Analyze Reset Pattern (Post-midnight only)
        if: steps.probe-type.outputs.type == 'post'
        run: |
          echo "🔍 Analyzing reset pattern..."
          
          # Count probe results
          PROBE_COUNT=$(find probes/results -name "probe_*_*.json" | wc -l)
          echo "Total probes executed: $PROBE_COUNT"
          
          # Look for patterns in recent results
          if [[ $PROBE_COUNT -ge 4 ]]; then
            echo "📊 Pattern analysis (4+ probes available):"
            find probes/results -name "probe_*_pre_metrics.txt" | tail -2 | while read file; do
              echo "Pre-midnight: $(grep http_status "$file")"
            done
            find probes/results -name "probe_*_post_metrics.txt" | tail -2 | while read file; do  
              echo "Post-midnight: $(grep http_status "$file")"
            done
          else
            echo "⏳ Collecting data... ($PROBE_COUNT/6 probes complete)"
          fi
          
      - name: Commit Probe Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Alpha Vantage Reset Probe"
          
          # Add all probe results and logs
          git add probes/ logs/ || true
          
          # Commit with descriptive message
          COMMIT_MSG="probe: Alpha Vantage reset timing ${{ steps.probe-type.outputs.window }} $(date -u +%Y-%m-%d)"
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ Probe results committed and pushed"
          fi
          
      - name: Probe Summary
        run: |
          echo "## Alpha Vantage Reset Probe Summary"
          echo "**Probe Type**: ${{ steps.probe-type.outputs.window }}"
          echo "**Result**: ${{ steps.probe.outputs.result }}"  
          echo "**HTTP Status**: ${{ steps.probe.outputs.http_status }}"
          echo "**Timestamp**: $(date -u +%Y-%m-%d\ %H:%M:%S) UTC"
          echo ""
          echo "**Files Created**:"
          echo "- ${{ steps.probe.outputs.response_file }}"
          echo "- ${{ steps.probe.outputs.metrics_file }}"
          echo ""
          echo "**Next Steps**: Monitor probe results over 72 hours to determine reset pattern"